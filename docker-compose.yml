services:
  web:
    build: .
    restart: unless-stopped
    container_name: bloomskilltech
    hostname: bloomskilltech
    env_file: .env          # SMTP_USER / SMTP_PASS / MAIL_TO live here (not committed)
    environment:
      NODE_ENV: production
      TRUST_PROXY_HOPS: "1"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bloomskilltech.rule=Host(`bloomskilltech.in`)"
      - "traefik.http.routers.bloomskilltech.entrypoints=websecure"
      - "traefik.http.routers.bloomskilltech.tls=true"
      - "traefik.http.routers.bloomskilltech.tls.certresolver=myresolver"
      - "traefik.http.services.bloomskilltech.loadbalancer.server.port=3001"
    networks:
      - default         # internal only — reached via the caddy service, not published
           # internal only — reached via the caddy service, not published
    logging:                # rotate captured stdout/stderr so it can't fill the disk
      driver: json-file
      options:
        max-size: "10m"     # rotate at 10 MB per file
        max-file: "5" 
networks:
  default:
    name: traefik
    external: true         # keep 5 rotated files (≈50 MB max)
